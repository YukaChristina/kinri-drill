<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a56db"/>
      <stop offset="100%" stop-color="#0d2847"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- 折れ線チャート -->
  <polyline
    points="80,360 160,280 240,310 320,180 400,140 440,100"
    fill="none" stroke="white" stroke-width="20"
    stroke-linecap="round" stroke-linejoin="round"
    opacity="0.9"
  />
  <!-- データポイント -->
  <circle cx="80"  cy="360" r="14" fill="#60a5fa"/>
  <circle cx="160" cy="280" r="14" fill="#60a5fa"/>
  <circle cx="240" cy="310" r="14" fill="#60a5fa"/>
  <circle cx="320" cy="180" r="14" fill="#fbbf24"/>
  <circle cx="400" cy="140" r="14" fill="#34d399"/>
  <circle cx="440" cy="100" r="14" fill="#34d399"/>
  <!-- X軸 -->
  <line x1="60" y1="400" x2="460" y2="400" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.3"/>
  <!-- Y軸 -->
  <line x1="60" y1="80" x2="60" y2="400" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.3"/>
</svg>
